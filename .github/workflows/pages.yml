name: Deploy to GitHub Pages

# Publishes the static site to GitHub Pages and AUTO-ENABLES Pages on the first
# run (configure-pages enablement: true), so no manual settings toggle is needed.
# Requires the repository to be PUBLIC (or a GitHub paid plan for private Pages).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
